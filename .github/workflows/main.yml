name: Code Scan with Cortex

on:
  push:
    branches:
      - branch-test
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }} 
  CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  CORTEX_API_URL: https://api-u-infra-appsec.xdr.kr.paloaltonetworks.com
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  cortex-code-scan:
    name: Cortex code scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Set up Java (cortexcli 요구: Java 11 이상)"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: "Set up Node.js (SCA 스캔 요구: Node.js 22 이상)"
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Cortex CLI dependencies (libhs.so.5)
        run: |
          sudo apt-get update
          sudo apt-get install -y libhyperscan5
      
      - name: Download Cortex CLI and run code scan
        id: cortex_scan
        continue-on-error: true
        run: |
          # [정제] 모든 종류의 공백(탭, 줄바꿈, 스페이스)을 확실히 제거
          CLEAN_ID=$(echo "${{ secrets.CORTEX_API_KEY_ID }}" | tr -d '[:space:]')
          CLEAN_KEY=$(echo "${{ secrets.CORTEX_API_KEY }}" | tr -d '[:space:]')

          # [디버그] 길이 확인 (ID는 짧아야 하고, KEY는 128자여야 합니다)
          echo "Debug: CORTEX_API_KEY_ID Length = ${#CLEAN_ID} (Should be short, e.g., 1-5)"
          echo "Debug: CORTEX_API_KEY Length = ${#CLEAN_KEY} (Should be long, e.g., 128)"

          # API 호출
          crtx_resp=$(curl -v -s "${{ env.CORTEX_API_URL }}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: $CLEAN_ID" \
            -H "Authorization: $CLEAN_KEY")
          
          crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url // empty")
          crtx_file=$(echo "$crtx_resp" | jq -r ".file_name // empty")

          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "Error: 401 Unauthorized. Key/ID mismatch suspected."
            echo "Please check GitHub Secrets: ID should be a number, KEY should be the long string."
            exit 1
          fi

          curl -s -o "$crtx_file" "$crtx_url"
          chmod +x "$crtx_file"
          ./"$crtx_file" --api-base-url "${{ env.CORTEX_API_URL }}" \
            --api-key "$CLEAN_KEY" \
            --api-key-id "$CLEAN_ID" \
            code scan --directory "${{ github.workspace }}" \
            --branch branch-test --repo-id "${{ github.repository }}" \
            --source "GITHUB_ACTIONS" \
            --output json \
            --output-file-path .result.json
# (아래는 GitHub Actions Summary 탭에 결과를 직접 출력할 때 사용하는 옵션입니다)
#            --output cli \
#            --compact > scan_result.txt
#          cat scan_result.txt
#          head -c 1000000 scan_result.txt > $GITHUB_STEP_SUMMARY

      - name: Show scan result # 생성된 JSON 결과를 로그창에 출력하는 단계
        run: cat .result.json

  build-image-scan-push:
    name: Build image, Cortex image scan, Push to ECR
    needs: cortex-code-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ env.ECR_REPOSITORY }}:build .

      - name: "Set up Java (cortexcli 요구: Java 11 이상)"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Cortex CLI dependencies (libhs.so.5)
        run: |
          sudo apt-get update
          sudo apt-get install -y libhyperscan5

      - name: Download Cortex CLI and run image scan
        run: |
          # [정제] 모든 종류의 공백(탭, 줄바꿈, 스페이스)을 확실히 제거
          CLEAN_ID=$(echo "${{ secrets.CORTEX_API_KEY_ID }}" | tr -d '[:space:]')
          CLEAN_KEY=$(echo "${{ secrets.CORTEX_API_KEY }}" | tr -d '[:space:]')

          # API 호출
          crtx_resp=$(curl -v -s "${{ env.CORTEX_API_URL }}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: $CLEAN_ID" \
            -H "Authorization: $CLEAN_KEY")
          
          crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url // empty")
          crtx_file=$(echo "$crtx_resp" | jq -r ".file_name // empty")

          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "Error: 401 Unauthorized or API Error. Response: $crtx_resp"
            exit 1
          fi

          curl -s -o cortexcli "$crtx_url"
          chmod +x cortexcli
          ./cortexcli --api-base-url "${{ env.CORTEX_API_URL }}" \
            --api-key "$CLEAN_KEY" \
            --api-key-id "$CLEAN_ID" \
            image scan ${{ env.ECR_REPOSITORY }}:build 

      - name: Trim AWS Secrets
        run: |
          echo "CLEAN_AWS_ID=$(echo '${{ secrets.AWS_ACCESS_KEY_ID }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "CLEAN_AWS_KEY=$(echo '${{ secrets.AWS_SECRET_ACCESS_KEY }}' | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.CLEAN_AWS_ID }}
          aws-secret-access-key: ${{ env.CLEAN_AWS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:build $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    name: Deploy to EKS
    needs: build-image-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trim AWS Secrets
        run: |
          echo "CLEAN_AWS_ID=$(echo '${{ secrets.AWS_ACCESS_KEY_ID }}' | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "CLEAN_AWS_KEY=$(echo '${{ secrets.AWS_SECRET_ACCESS_KEY }}' | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.CLEAN_AWS_ID }}
          aws-secret-access-key: ${{ env.CLEAN_AWS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Deployment의 이미지 업데이트
          kubectl set image deployment/github-action-test-deployment github-action-test-container=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          
          # 배포 상태 확인
          kubectl rollout status deployment/github-action-test-deployment