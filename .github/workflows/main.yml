name: Build, Scan, Push to ECR and Deploy to EKS

on:
  push:
    branches:
      - branch-test
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
  CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  CORTEX_API_URL: ${{ secrets.CORTEX_API_URL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cortex-code-scan:
    name: Cortex code scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Set up Java (cortexcli 요구: Java 11 이상)"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Cortex CLI dependencies (libhs.so.5)
        run: |
          sudo apt-get update
          sudo apt-get install -y libhyperscan5

      - name: Download Cortex CLI and run code scan
        id: cortex_scan
        continue-on-error: true
        run: |
          set -x
          crtx_resp=$(curl -s "${{ secrets.CORTEX_API_URL }}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${{ secrets.CORTEX_API_KEY }}" \
            -H "Authorization: ${{ secrets.CORTEX_API_KEY_ID }}")
          
          crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url // empty")
          crtx_file=$(echo "$crtx_resp" | jq -r ".file_name // empty")
          
          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "Error: Failed to get download URL. API response: $crtx_resp"
            exit 1
          fi


          # 다운로드 및 실행
          curl -s -o cortexcli "$crtx_url"
          chmod +x cortexcli
          ./cortexcli --api-base-url "${{ secrets.CORTEX_API_URL }}" \
            --api-key "$CLEAN_KEY" \
            --api-key-id "$CLEAN_ID" \
            code scan --directory "${{ github.workspace }}" \
            --branch branch-test --repo-id "${{ github.repository }}" \
            --source "GITHUB_ACTIONS" \
            --output json \
            --output-file-path .result.json
      
      - name: Show scan result
        run: |
          if [ -f .result.json ]; then
            cat .result.json
          else
            echo "Scan result file not found."
          fi

  build-image-scan-push:
    name: Build image, Cortex image scan, Push to ECR
    needs: cortex-code-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ secrets.ECR_REPOSITORY }}:build .

      - name: "Set up Java (cortexcli 요구: Java 11 이상)"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Cortex CLI dependencies (libhs.so.5)
        run: |
          sudo apt-get update
          sudo apt-get install -y libhyperscan5

      - name: Download Cortex CLI and run image scan
        run: |
          set -x
          crtx_resp=$(curl -s "${{ secrets.CORTEX_API_URL }}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${{ secrets.CORTEX_API_KEY_ID }}" \
            -H "Authorization: ${{ secrets.CORTEX_API_KEY }}")
          
          crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url // empty")

          if [ "$crtx_url" == "null" ] || [ -z "$crtx_url" ]; then
            echo "Error: Failed to get download link. Response: $crtx_resp"
            exit 1
          fi

          curl -s -o cortexcli "$crtx_url"
          chmod +x cortexcli
          ./cortexcli --api-base-url "${{ secrets.CORTEX_API_URL }}" \
            --api-key "$CLEAN_KEY" \
            --api-key-id "$CLEAN_ID" \
            image scan ${{ secrets.ECR_REPOSITORY }}:build 

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag $ECR_REPOSITORY:build $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EKS
    needs: build-image-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Deployment의 이미지 업데이트
          kubectl set image deployment/github-action-test-deployment github-action-test-container=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # 배포 상태 확인
          kubectl rollout status deployment/github-action-test-deployment
