<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>배포 테스트 페이지</title>
</head>

<body>
    <h1>안녕하세요! GitHub Actions 배포 테스트 중입니다.</h1>
    <p>성공적으로 웹 서버에 업로드되었습니다.</p>
    <p>3rd test</p>
    <p>이 라인은 테스트를 위한 라인입니다.</p>
    <p>2이 라인은 테스트를 위한 라인입니다.</p>

    <script>
        // 1. 하드코딩된 API 키 (보안 로봇이 가장 먼저 잡아내는 취약점)
        const AWS_SECRET_KEY = "AKIAI0SFOENN7EXAMPLE";

        // 2. 테스트용 관리자 비밀번호 노출
        const ADMIN_PASSWORD = "password1234!";

        // 3. XSS (Cross-Site Scripting) 취약점: URL 파라미터를 검증 없이 화면에 출력
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        if (name) {
            document.write("환영합니다, " + name + "님!"); // 취약한 코드
        }

        // 4. 안전하지 않은 외부 스크립트 로드 (HTTP 사용)
        const insecureScript = document.createElement('script');
        insecureScript.src = "http://untrusted-source.com/library.js";
        document.head.appendChild(insecureScript);

        console.log("관리자 모드 활성화용 키:", AWS_SECRET_KEY);
    </script>
</body>

</html>
